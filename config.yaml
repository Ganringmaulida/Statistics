# ── Model Parameters ─────────────────────────────────────────────────────────
model:
  home_advantage_goals:     0.35
  dixon_coles_rho:          -0.13
  nba_pythagorean_exp:      13.91
  nhl_pythagorean_exp:      2.37
  min_edge_moneyline:       0.05
  edge_medium_confidence:   0.07
  edge_high_confidence:     0.12
  team_similarity_threshold: 0.80
  injury_penalty_per_key:   0.08

ensemble:
  model_weight: 0.65
  elo_weight:   0.20
  h2h_weight:   0.15

cache:
  dir: "cache"
  ttl_hours:
    odds:     1
    fixtures: 3
    stats:    6
    injuries: 3

