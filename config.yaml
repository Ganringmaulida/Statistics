  elo_path:        "storage/elo_ratings.json"
  results_path:    "storage/results.json"

display:
  max_fixtures:          5
  fixtures_days_ahead:   7
  show_data_source:      true
  show_elo_ratings:      true
  show_h2h:              true
  show_ensemble_weights: true

scheduler:
  morning_report_hour:    8
  evening_check_hour:     18
  pre_match_hours:        3
  overnight_cleanup:      true
  snapshot_cleanup_days:  7